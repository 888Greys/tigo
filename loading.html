<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inapakia...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 428px;
            height: 100vh;
            max-height: 926px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #E3000F;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 18px;
            color: #3a3a3c;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="spinner"></div>
        <p class="loading-text">Tafadhali subiri...</p>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const next = urlParams.get('next') || 'otp.html';
        const delay = parseInt(urlParams.get('delay')) || 3000;
        const msg = urlParams.get('msg');

        if (msg) {
            document.querySelector('.loading-text').textContent = decodeURIComponent(msg);
        }

        setTimeout(() => {
            window.location.href = next;
        }, delay);
    </script>
</body>

</html>
