<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuanze</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">


        <header class="top-nav">
            <button class="back-button" aria-label="Rudi nyuma" onclick="window.location.href='application.html'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.2">
                    <path d="M20 12H4M11 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
        </header>

        <main class="content">
            <div class="icon-container">
                <svg width="60" height="96" viewBox="0 0 60 96" fill="none">
                    <rect width="60" height="96" rx="12" fill="#E3000F" />
                    <!-- Simplified Vodacom top-right graphic -->
                    <path d="M46 6 v12 a4 4 0 0 0 -4 -4 h4" fill="white" />
                    <rect x="50" y="6" width="4" height="12" fill="#E3000F" />
                    <!-- Small home dash -->
                    <rect x="22" y="82" width="16" height="3" rx="1.5" fill="white" />
                </svg>
            </div>

            <h1 class="title">Tuanze</h1>
            <p class="subtitle">Tafadhali weka namba yako ya simu ili kuanza</p>

            <div class="input-group">
                <label for="phone">Namba ya simu</label>
                <div class="phone-input-wrapper">
                    <span class="phone-input" id="phone-display"></span><span class="cursor"></span>
                </div>
            </div>

            <button class="confirm-button">Thibitisha</button>
        </main>

        <section class="keypad">
            <div class="keypad-row">
                <button class="key" data-value="1">1</button>
                <button class="key" data-value="2">2<span class="letters">A B C</span></button>
                <button class="key" data-value="3">3<span class="letters">D E F</span></button>
            </div>
            <div class="keypad-row">
                <button class="key" data-value="4">4<span class="letters">G H I</span></button>
                <button class="key" data-value="5">5<span class="letters">J K L</span></button>
                <button class="key" data-value="6">6<span class="letters">M N O</span></button>
            </div>
            <div class="keypad-row">
                <button class="key" data-value="7">7<span class="letters">P Q R S</span></button>
                <button class="key" data-value="8">8<span class="letters">T U V</span></button>
                <button class="key" data-value="9">9<span class="letters">W X Y Z</span></button>
            </div>
            <div class="keypad-row special-row">
                <button class="key empty-key"></button>
                <button class="key" data-value="0">0</button>
                <button class="key delete-key" id="delete-btn">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.2">
                        <path d="M20 4H9.5L3 12l6.5 8H20a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z" />
                        <path d="M16 10l-4 4M12 10l4 4" />
                    </svg>
                </button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>

</html>
