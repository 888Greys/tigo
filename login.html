<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuanze</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">


        <header class="top-nav">
            <button class="back-button" aria-label="Rudi nyuma" onclick="window.location.href='application.html'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.2">
                    <path d="M20 12H4M11 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
        </header>

        <main class="content">
            <div class="icon-container">
                <svg width="60" height="96" viewBox="0 0 60 96" fill="none">
                    <rect width="60" height="96" rx="12" fill="#E3000F" />
                    <!-- Simplified Vodacom top-right graphic -->
                    <path d="M46 6 v12 a4 4 0 0 0 -4 -4 h4" fill="white" />
                    <rect x="50" y="6" width="4" height="12" fill="#E3000F" />
                    <!-- Small home dash -->
                    <rect x="22" y="82" width="16" height="3" rx="1.5" fill="white" />
                </svg>
            </div>

            <h1 class="title">Tuanze</h1>
            <p class="subtitle">Tafadhali weka namba yako ya simu ili kuanza</p>

            <div class="input-group">
                <label for="phone">Namba ya simu</label>
                <div class="phone-input-wrapper">
                    <span class="country-prefix">+255</span>
                    <input type="tel" id="app-phone" class="phone-input" placeholder="Weka namba yako" pattern="[0-9]*"
                        inputmode="numeric">
                </div>
            </div>

            <button class="confirm-button">Thibitisha</button>
        </main>
    </div>
    <style>
        .phone-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 24px;
            font-weight: 500;
            color: #1c1c1e;
            padding: 10px 0;
            outline: none;
        }

        .country-prefix {
            font-size: 24px;
            font-weight: 500;
            color: #1c1c1e;
            padding: 10px 0;
            margin-right: 10px;
        }

        .phone-input-wrapper {
            display: flex;
            align-items: center;
            border-bottom: 2px solid #E3000F;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .confirm-button {
            margin-top: 20px;
        }
    </style>
    <script src="script.js"></script>
</body>

</html>
