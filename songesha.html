<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mipango ya Songesha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 428px;
            height: 100vh;
            max-height: 926px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #E3000F;
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 60px;
        }

        .back-button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .back-button:hover {
            opacity: 0.8;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            flex: 1;
        }

        .header-spacer {
            width: 40px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .icon-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .icon-container svg {
            width: 80px;
            height: 80px;
            background-color: #FFE5E5;
            border-radius: 20px;
            padding: 15px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #000;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #000;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background-color: #f8f8f8;
            border-radius: 8px;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
        }

        .country-prefix {
            font-size: 16px;
            font-weight: 500;
            color: #999;
            margin-right: 8px;
        }

        input[type="number"],
        input[type="text"] {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 20px;
            font-weight: 500;
            color: #000;
            outline: none;
        }

        input::placeholder {
            color: #ccc;
        }

        .info-box {
            background-color: #FFF3F3;
            border: 1px solid #FFE5E5;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 25px;
            display: none;
        }

        .info-box.show {
            display: block;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .info-value {
            font-size: 24px;
            font-weight: 700;
            color: #E3000F;
            word-break: break-word;
        }

        .calculation-info {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-style: italic;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: auto;
            padding-top: 20px;
        }

        .back-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid #E3000F;
            background-color: transparent;
            color: #E3000F;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #FFE5E5;
        }

        .next-btn {
            flex: 1;
            padding: 14px;
            background-color: #E3000F;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .next-btn:hover:not(:disabled) {
            background-color: #c90008;
        }

        .next-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            color: #E3000F;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading-view {
            display: none;
            text-align: center;
            padding: 60px 20px;
            justify-content: center;
            flex-direction: column;
        }

        .loading-view.show {
            display: flex;
        }

        .spinner-circle {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #E3000F;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            font-weight: 500;
            color: #666;
        }

        .content-view {
            display: flex;
            flex-direction: column;
        }

        .result-reveal {
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="header">
            <button class="back-button" aria-label="Rudi nyuma" onclick="window.location.href='calculator.html'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <path d="M20 12H4M11 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <div class="header-title">Mipango ya Songesha</div>
            <div class="header-spacer"></div>
        </header>

        <main class="content">
            <!-- Loading View -->
            <div class="loading-view" id="loading-view">
                <div class="spinner-circle"></div>
                <p class="loading-text">Tunakukualkulia mkopo wako...</p>
            </div>

            <!-- Content View -->
            <div class="content-view" id="content-view">
                <div class="icon-container">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="48" fill="#E3000F" opacity="0.1" />
                        <text x="50" y="60" font-size="40" font-weight="bold" text-anchor="middle" fill="#E3000F">₨</text>
                    </svg>
                </div>

                <h1>Angalia Mipango Yako</h1>
                <p class="subtitle">Weka kiwango cha Songesha ili kuona mkopo unayostahili kupata</p>

                <div class="input-group">
                    <label for="current-limit">Kiwango Kilichopatikana (TSh)</label>
                    <div class="phone-input-wrapper">
                        <input type="number" id="current-limit" 
                               class="limit-input" 
                               placeholder="Weka kiwango" 
                               inputmode="numeric"
                               min="0">
                    </div>
                    <div class="error-message" id="error-message"></div>
                </div>

                <div class="info-box" id="result-box">
                    <div class="info-label">Ungepata Mkopo Hadi</div>
                    <div class="info-value" id="calculated-limit">TSh 0</div>
                    <div class="calculation-info">Hesabu: Songesha × 3</div>
                </div>

                <div class="button-group">
                    <button class="back-btn" onclick="window.location.href='calculator.html'">Nyuma</button>
                    <button class="next-btn" id="continue-btn" disabled>Endelea</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const limitInput = document.getElementById('current-limit');
        const resultBox = document.getElementById('result-box');
        const calculatedLimitDisplay = document.getElementById('calculated-limit');
        const continueBtn = document.getElementById('continue-btn');
        const errorMessage = document.getElementById('error-message');
        const loadingView = document.getElementById('loading-view');
        const contentView = document.getElementById('content-view');

        // Restore value from sessionStorage if exists
        const savedLimit = sessionStorage.getItem('songeshaSongesha');
        if (savedLimit) {
            limitInput.value = savedLimit;
            updateCalculation();
        }

        limitInput.addEventListener('input', updateCalculation);

        function updateCalculation() {
            const currentLimit = parseInt(limitInput.value) || 0;
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';

            if (currentLimit > 0) {
                const maxLoan = currentLimit * 3;
                const formattedAmount = 'TSh ' + maxLoan.toLocaleString();
                calculatedLimitDisplay.textContent = formattedAmount;
                resultBox.classList.add('show');
                continueBtn.disabled = false;
                
                // Save to sessionStorage
                sessionStorage.setItem('songeshaSongesha', currentLimit);
                sessionStorage.setItem('maxLoanFromSongesha', maxLoan);
            } else {
                resultBox.classList.remove('show');
                continueBtn.disabled = true;
                sessionStorage.removeItem('songeshaSongesha');
                sessionStorage.removeItem('maxLoanFromSongesha');
            }
        }

        function showLoadingAndReveal() {
            // Hide content, show loading
            contentView.style.display = 'none';
            loadingView.classList.add('show');
            
            // Disable button during loading
            continueBtn.disabled = true;

            // After 2.5 seconds, hide loading and show content with animation
            setTimeout(() => {
                loadingView.classList.remove('show');
                contentView.style.display = 'flex';
                
                // Trigger animation on result box
                resultBox.classList.remove('result-reveal');
                // Force reflow to restart animation
                void resultBox.offsetWidth;
                resultBox.classList.add('result-reveal');
                
                // Re-enable button and change text
                continueBtn.disabled = false;
                continueBtn.textContent = 'Endelea kwa Ombi';
                continueBtn.dataset.revealed = 'true';
            }, 2500);
        }

        // Handle button click differently based on state
        continueBtn.addEventListener('click', () => {
            const currentLimit = parseInt(limitInput.value) || 0;
            
            // If already revealed, proceed to application
            if (continueBtn.dataset.revealed === 'true') {
                window.location.href = 'application.html';
                return;
            }
            
            if (currentLimit <= 0) {
                errorMessage.textContent = 'Tafadhali weka kiwango sahihi.';
                errorMessage.classList.add('show');
                return;
            }

            if (currentLimit > 10000000) {
                errorMessage.textContent = 'Kiwango kilichoweka ni kikali sana. Tafadhali angalia tena.';
                errorMessage.classList.add('show');
                return;
            }

            // Show loading and then reveal
            showLoadingAndReveal();
        });

        // Allow Enter key to submit
        limitInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                continueBtn.click();
            }
        });
    </script>
</body>

</html>
