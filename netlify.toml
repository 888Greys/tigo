[build]
  publish = "."
  command = "sed -i \"s/VITE_TENANT_KEY_PLACEHOLDER/${VITE_TENANT_KEY}/g\" utils/apiClient.js"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
